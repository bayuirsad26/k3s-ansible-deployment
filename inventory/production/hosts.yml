---
all:
  children:
    k3s_cluster:
      children:
        k3s_master:
          hosts:
            master-node:
              ansible_host: 10.0.0.10  # Ganti dengan IP master node
              ansible_user: ubuntu
              k3s_node_name: master-node
              k3s_control_node: true
        k3s_worker:
          hosts:
            worker-node-1:
              ansible_host: 10.0.0.11  # Ganti dengan IP worker 1
              ansible_user: ubuntu
              k3s_node_name: worker-node-1
            worker-node-2:
              ansible_host: 10.0.0.12  # Ganti dengan IP worker 2
              ansible_user: ubuntu
              k3s_node_name: worker-node-2
    monitoring_server:
      hosts:
        monitoring:
          ansible_host: 10.0.0.20  # Ganti dengan IP monitoring server
          ansible_user: ubuntu
