---
- name: Create monitoring directory
  file:
    path: /opt/monitoring
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Install Docker
  include_tasks: install-docker.yml

- name: Deploy Prometheus
  docker_container:
    name: prometheus
    image: "prom/prometheus:v{{ prometheus_version }}"
    state: started
    restart_policy: always
    ports:
      - "9090:9090"
    volumes:
      - /opt/monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'

- name: Deploy Grafana
  docker_container:
    name: grafana
    image: "grafana/grafana:{{ grafana_version }}"
    state: started
    restart_policy: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - /opt/monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-clock-panel"

- name: Deploy Loki
  docker_container:
    name: loki
    image: "grafana/loki:{{ loki_version }}"
    state: started
    restart_policy: always
    ports:
      - "3100:3100"
    volumes:
      - /opt/monitoring/loki:/etc/loki
      - loki_data:/loki
    command: "-config.file=/etc/loki/loki-config.yml"

- name: Deploy AlertManager
  docker_container:
    name: alertmanager
    image: "prom/alertmanager:latest"
    state: started
    restart_policy: always
    ports:
      - "9093:9093"
    volumes:
      - /opt/monitoring/alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager

- name: Configure Prometheus scrape configs
  template:
    src: prometheus.yml.j2
    dest: /opt/monitoring/prometheus/prometheus.yml
  notify: restart prometheus

- name: Configure Grafana datasources
  template:
    src: grafana-datasources.yml.j2
    dest: /opt/monitoring/grafana/provisioning/datasources/datasources.yml

- name: Import Grafana dashboards
  copy:
    src: "{{ item }}"
    dest: /opt/monitoring/grafana/provisioning/dashboards/
  with_fileglob:
    - ../files/dashboards/*.json
