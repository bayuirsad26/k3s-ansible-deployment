---
- name: Deploy Application Stack
  hosts: k3s_master
  gather_facts: yes
  become: yes
  
  tasks:
    - name: Deploy databases
      block:
        - name: Deploy PostgreSQL HA
          include_role:
            name: postgresql
          tags: postgresql
          
        - name: Deploy Redis Sentinel
          include_role:
            name: redis
          tags: redis

    - name: Deploy IPFS nodes
      include_role:
        name: ipfs
      tags: ipfs

    - name: Deploy application services
      block:
        - name: Deploy backend services
          include_role:
            name: backend
          tags: backend
          
        - name: Deploy frontend applications
          include_role:
            name: frontend
          tags: frontend

    - name: Verify deployments
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: applications
      register: app_deployments
      
    - name: Display deployment status
      debug:
        msg: "{{ item.metadata.name }} - Replicas: {{ item.status.readyReplicas }}/{{ item.spec.replicas }}"
      loop: "{{ app_deployments.resources }}"
